name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build static release binaries
        run: nix develop --command task release

      - name: Verify static binaries
        run: nix develop --command task release:verify

      - name: Rename binaries
        run: |
          cp target/x86_64-unknown-linux-musl/release/hs hs-x86_64-linux
          cp target/aarch64-unknown-linux-musl/release/hs hs-aarch64-linux

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes hs-x86_64-linux hs-aarch64-linux
